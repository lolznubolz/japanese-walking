name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Scaffold Android platform folder
        working-directory: japanese_walking
        run: flutter create . --platforms=android --org app.walkbeat --project-name japanese_walking

      - name: Generate audio assets
        working-directory: japanese_walking
        run: python3 tools/generate_audio.py

      - name: Patch AndroidManifest (permissions + app name)
        working-directory: japanese_walking
        run: python3 tools/patch_android.py

      - name: Build release APK
        working-directory: japanese_walking
        run: |
          flutter pub get
          flutter build apk --release

      - name: Build AAB for Google Play
        working-directory: japanese_walking
        run: flutter build appbundle --release

      - name: Sign AAB with upload key
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KS: ${{ secrets.KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "$KS" | base64 -d > /tmp/upload.jks
          AAB=japanese_walking/build/app/outputs/bundle/release/app-release.aab
          zip -d "$AAB" "META-INF/*" || true
          jarsigner -keystore /tmp/upload.jks -storepass "$KS_PASS" "$AAB" "$KS_ALIAS"
          jarsigner -verify "$AAB"

      - name: Rename artifacts
        run: |
          cp japanese_walking/build/app/outputs/flutter-apk/app-release.apk yaponskaya-hodba.apk
          cp japanese_walking/build/app/outputs/bundle/release/app-release.aab walkbeat-playstore.aab

      - name: Publish to release "latest"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "WalkBeat — последняя сборка"
          body: "APK — для прямой установки (разрешите установку из неизвестных источников). AAB — для загрузки в Google Play Console."
          files: |
            yaponskaya-hodba.apk
            walkbeat-playstore.aab
