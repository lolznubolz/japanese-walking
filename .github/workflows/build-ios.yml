name: Build iOS (cloud test)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'japanese_walking/**'
      - '.github/workflows/build-ios.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Scaffold iOS platform folder
        working-directory: japanese_walking
        run: flutter create . --platforms=ios --org app.walkbeat --project-name japanese_walking

      - name: Generate audio assets
        working-directory: japanese_walking
        run: python3 tools/generate_audio.py

      - name: Patch Info.plist (permissions + display name)
        working-directory: japanese_walking
        run: python3 tools/patch_ios.py

      - name: Analyze
        working-directory: japanese_walking
        run: |
          flutter pub get
          flutter analyze --no-fatal-infos || true

      - name: Build for iOS Simulator (no signing)
        working-directory: japanese_walking
        run: flutter build ios --simulator --no-codesign

      - name: Launch in simulator and capture screenshot
        working-directory: japanese_walking
        continue-on-error: true
        run: |
          set -x
          APP="build/ios/iphonesimulator/Runner.app"
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP/Info.plist")
          echo "Bundle id: $BUNDLE_ID"
          UDID=$(xcrun simctl list devices available | grep -E "iPhone 1[5-9]|iPhone 1[0-9] Pro" | head -1 | grep -oE "[0-9A-F-]{36}")
          if [ -z "$UDID" ]; then
            UDID=$(xcrun simctl list devices available | grep -m1 "iPhone" | grep -oE "[0-9A-F-]{36}")
          fi
          echo "Simulator UDID: $UDID"
          xcrun simctl boot "$UDID" || true
          sleep 25
          xcrun simctl install "$UDID" "$APP"
          xcrun simctl launch "$UDID" "$BUNDLE_ID" || true
          sleep 15
          mkdir -p "$GITHUB_WORKSPACE/ios_screens"
          xcrun simctl io "$UDID" screenshot "$GITHUB_WORKSPACE/ios_screens/01_launch.png"

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots
          path: ios_screens/
          if-no-files-found: warn

      - name: Build unsigned IPA (for Sideloadly / AltStore)
        working-directory: japanese_walking
        run: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          rm -rf Payload && mkdir Payload
          cp -R Runner.app Payload/
          zip -qry "$GITHUB_WORKSPACE/WalkBeat-unsigned.ipa" Payload

      - name: Publish IPA to release "latest"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "WalkBeat — последняя сборка"
          files: WalkBeat-unsigned.ipa
