name: Build iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14   # macOS-раннер с Xcode — обязателен для iOS
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Scaffold iOS platform folder
        working-directory: japanese_walking
        run: flutter create . --platforms=ios --org app.walkbeat --project-name japanese_walking

      - name: Generate audio assets
        working-directory: japanese_walking
        run: python3 tools/generate_audio.py

      - name: Patch Info.plist (Bluetooth + background + RU name)
        working-directory: japanese_walking
        run: python3 tools/patch_ios.py

      - name: Build iOS (no codesign)
        working-directory: japanese_walking
        run: |
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Result
        run: echo "✅ iOS-приложение успешно собралось. Для TestFlight/App Store включим подпись (секреты Apple) — см. README_iOS.md."

