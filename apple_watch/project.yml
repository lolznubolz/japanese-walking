name: WalkBeatWatch
options:
  bundleIdPrefix: app.walkbeat
  deploymentTarget:
    watchOS: "10.0"
settings:
  base:
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  WalkBeatWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.walkbeat.watch
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_CFBundleDisplayName: WalkBeat
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
