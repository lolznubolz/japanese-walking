name: WalkBeatWatch
options:
  bundleIdPrefix: app.walkbeat
  deploymentTarget:
    watchOS: "10.0"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  WalkBeatWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Sources/WalkBeatApp.swift
      - path: Sources/ContentView.swift
      - path: Sources/SessionController.swift
      - path: Sources/SessionView.swift
      - path: Sources/HeartRateManager.swift
    info:
      path: Generated-Info.plist
      properties:
        CFBundleDisplayName: WalkBeat
        WKApplication: true
        NSHealthShareUsageDescription: "Показ пульса с датчика часов во время тренировки ходьбы"
        NSHealthUpdateUsageDescription: "Запись тренировки ходьбы в Здоровье"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.walkbeat.watch
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
