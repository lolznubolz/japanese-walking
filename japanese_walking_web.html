<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0E1116">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>Японская ходьба · Japanese Walking</title>
<style>
  :root{
    --bg:#0E1116; --card:rgba(255,255,255,.05); --txt:#ECEFF4; --dim:rgba(255,255,255,.55);
    --fast:#FF7A59; --slow:#4FD8C4; --radius:24px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0; background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100dvh; display:flex; justify-content:center}
  .app{width:100%; max-width:430px; padding:20px 20px calc(20px + env(safe-area-inset-bottom))}
  h1{font-size:28px; margin:0}
  .sub{color:var(--dim); font-size:13px; margin:4px 0 20px}
  .card{background:var(--card); border-radius:var(--radius); padding:18px; margin-bottom:14px}
  .row{display:flex; justify-content:space-between; align-items:center; gap:10px}
  .row+.row{margin-top:12px}
  label{font-size:14px}
  .val{font-weight:600; font-size:14px}
  .val.fast{color:var(--fast)} .val.slow{color:var(--slow)}
  input[type=range]{width:100%; accent-color:var(--slow); margin:6px 0 2px}
  input[type=range].fast{accent-color:var(--fast)}
  .switch{appearance:none; width:46px; height:28px; border-radius:14px; background:#333a45; position:relative; cursor:pointer; transition:.2s; flex:none}
  .switch:checked{background:var(--slow)}
  .switch::after{content:""; position:absolute; top:3px; left:3px; width:22px; height:22px; border-radius:50%; background:#fff; transition:.2s}
  .switch:checked::after{left:21px}
  button{border:0; border-radius:28px; padding:16px 24px; font-size:17px; font-weight:600; cursor:pointer; color:#0E1116; background:var(--slow); width:100%}
  button.ghost{background:rgba(255,255,255,.1); color:var(--txt)}
  button.danger{background:var(--fast)}
  button.small{width:44px; height:44px; padding:0; border-radius:50%; font-size:24px; line-height:1}
  .seg{display:flex; background:var(--card); border-radius:18px; padding:4px; margin-bottom:14px}
  .seg button{padding:9px; border-radius:14px; background:transparent; color:var(--dim); font-size:14px}
  .seg button.on{background:rgba(255,255,255,.12); color:var(--txt)}
  .about{font-size:12px; color:var(--dim); line-height:1.5; margin:10px 0 18px}
  /* session */
  #session{display:none}
  .bar{height:6px; border-radius:3px; background:rgba(255,255,255,.08); overflow:hidden; margin-bottom:8px}
  .bar i{display:block; height:100%; width:0; background:var(--slow); transition:width .3s, background .4s}
  .cyc{text-align:center; color:var(--dim); font-size:13px; margin-bottom:18px}
  .ringWrap{position:relative; width:280px; height:280px; margin:0 auto 22px}
  .ringWrap svg{transform:rotate(-90deg)}
  .ringTxt{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center}
  #phaseName{font-size:20px; font-weight:800; letter-spacing:4px; transition:color .4s}
  #clock{font-size:62px; font-weight:700; font-variant-numeric:tabular-nums}
  .bpmCard{display:flex; align-items:center; justify-content:space-between}
  #bpmVal{font-size:26px; font-weight:700; text-align:center}
  .bpmU{font-size:11px; color:var(--dim); text-align:center}
  .hint{font-size:12px; color:var(--dim); text-align:center; margin:8px 0 14px}
  .btns{display:flex; gap:10px}
  #finished{display:none; text-align:center; padding-top:60px}
  #finished .emoji{font-size:80px}
  .note{font-size:11px; color:var(--dim); text-align:center; margin-top:10px}
</style>
</head>
<body>
<div class="app">

  <!-- ONBOARDING (first launch) -->
  <div id="onb" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:50;overflow:auto">
    <div class="app" style="margin:0 auto">
      <h1 style="margin-top:30px">🚶 <span data-i="appTitle"></span></h1>
      <div class="sub" data-i="onbText"></div>
      <div class="seg" id="onbLang">
        <button data-lang="ru" style="flex:1">Русский</button>
        <button data-lang="en" style="flex:1">English</button>
      </div>
      <div class="card">
        <div class="row"><label data-i="age"></label><span class="val" id="onbAgeVal"></span></div>
        <input type="range" id="onbAge" min="14" max="90" step="1">
        <div class="row"><label data-i="weight"></label><span class="val" id="onbWeightVal"></span></div>
        <input type="range" id="onbWeight" min="40" max="150" step="1">
        <div class="row"><label data-i="goalSetting"></label><span class="val" id="onbGoalVal"></span></div>
        <input type="range" id="onbGoal" min="30" max="120" step="10">
      </div>
      <button id="onbGo" data-i="onbStart"></button>
      <div class="about" data-i="aboutText"></div>
    </div>
  </div>

  <!-- ZONE CALIBRATION TEST -->
  <div id="calib" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:60">
    <div class="app" style="text-align:center;padding-top:60px">
      <h1>🎯 <span data-i="calib"></span></h1>
      <p class="sub" data-i="calibRun"></p>
      <div id="calibClock" style="font-size:64px;font-weight:700">03:00</div>
      <div id="calibHr" style="color:var(--fast);font-size:22px;font-weight:700;margin:10px 0 30px">—</div>
      <button class="danger" id="calibStop" data-i="stop"></button>
    </div>
  </div>

  <!-- HOME -->
  <div id="home">
    <h1 data-i="appTitle"></h1>
    <div class="sub" data-i="subtitle"></div>

    <div class="seg" id="langSeg">
      <button data-lang="ru" style="flex:1">Русский</button>
      <button data-lang="en" style="flex:1">English</button>
    </div>

    <div class="card">
      <div class="row"><label data-i="fastPace"></label><span class="val fast" id="fastVal"></span></div>
      <input type="range" class="fast" id="fastBpm" min="90" max="190" step="1">
      <div class="row"><label data-i="slowPace"></label><span class="val slow" id="slowVal"></span></div>
      <input type="range" id="slowBpm" min="50" max="140" step="1">
      <div class="row"><label data-i="phaseLength"></label><span class="val" id="phaseVal"></span></div>
      <input type="range" id="phaseMin" min="1" max="5" step="0.5">
      <div class="row"><label data-i="cyclesCount"></label><span class="val" id="cycVal"></span></div>
      <input type="range" id="cycles" min="1" max="12" step="1">
      <div class="row"><label data-i="totalTime"></label><span class="val" id="totalVal"></span></div>
      <div class="row"><label data-i="goalSetting"></label><span class="val" id="goalMinVal"></span></div>
      <input type="range" id="goalMin" min="30" max="120" step="10">
    </div>

    <div class="card">
      <div class="row"><label data-i="metronome"></label><input type="checkbox" class="switch" id="metroOn"></div>
      <div class="row"><label data-i="vibration"></label><input type="checkbox" class="switch" id="vibOn"></div>
      <div class="row"><label data-i="phaseSounds"></label><input type="checkbox" class="switch" id="sndOn"></div>
      <div class="row"><label data-i="tickVolume"></label><span class="val" id="volVal"></span></div>
      <input type="range" id="vol" min="0" max="100" step="5">
      <div class="row"><label data-i="voice"></label><input type="checkbox" class="switch" id="voiceOn"></div>
      <div class="row"><label data-i="weight"></label><span class="val" id="weightVal"></span></div>
      <input type="range" id="weight" min="40" max="150" step="1">
    </div>

    <!-- Weekly goal -->
    <div class="card" id="goalCard">
      <div class="row">
        <label data-i="weeklyGoal"></label>
        <span class="val" id="goalTxt"></span>
      </div>
      <div class="bar" style="margin-top:10px"><i id="goalBar" style="background:var(--fast)"></i></div>
    </div>

    <!-- Progression suggestion -->
    <div class="card" id="progCard" style="display:none">
      <div class="row">
        <label id="progTxt" style="font-size:13px"></label>
        <button class="ghost" id="progApply" style="width:auto;padding:8px 16px;font-size:14px" data-i="apply"></button>
      </div>
    </div>

    <div class="card" id="histCard" style="display:none">
      <div class="row"><label>🔥 <span data-i="streak"></span></label><span class="val" id="streakVal"></span></div>
      <div class="row"><label data-i="totalWorkouts"></label><span class="val" id="twVal"></span></div>
      <div id="badges" style="margin-top:10px;font-size:13px;line-height:1.8"></div>
      <div style="margin-top:10px">
        <div class="note" style="text-align:left" data-i="chartT"></div>
        <svg id="chart" width="100%" height="80" viewBox="0 0 320 80" preserveAspectRatio="none"></svg>
      </div>
      <div id="histList" style="margin-top:10px"></div>
    </div>

    <div class="card">
      <div class="row"><label data-i="smartMode"></label><input type="checkbox" class="switch" id="smartOn"></div>
      <div id="smartSet" style="display:none">
        <div class="row"><label data-i="age"></label><span class="val" id="ageVal"></span></div>
        <input type="range" id="age" min="14" max="90" step="1">
        <div class="row"><label data-i="targetZone"></label><span class="val" id="zoneVal"></span></div>
        <button class="ghost" id="calibBtn" style="margin-top:8px;font-size:15px;padding:12px">🎯 <span data-i="calib"></span></button>
        <div class="note" id="calibNote" style="text-align:left"></div>
        <div class="note" style="text-align:left" data-i="smartHint"></div>
      </div>
    </div>
    <button id="startBtn" data-i="start"></button>
    <button class="ghost" id="hrBtn" style="margin-top:10px">♥</button>
    <div class="note" id="hrNote"></div>
    <div class="note" data-i="vibNote"></div>
    <div class="about" data-i="aboutText"></div>
  </div>

  <!-- SESSION -->
  <div id="session">
    <div class="bar"><i id="totalBar"></i></div>
    <div class="cyc" id="cycLabel"></div>
    <div class="cyc" id="statsLive" style="margin-top:-14px"></div>
    <div class="ringWrap">
      <svg width="280" height="280" viewBox="0 0 280 280">
        <circle cx="140" cy="140" r="126" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="14"/>
        <circle id="ring" cx="140" cy="140" r="126" fill="none" stroke="#4FD8C4" stroke-width="14"
                stroke-linecap="round" stroke-dasharray="791.7" stroke-dashoffset="791.7"/>
      </svg>
      <div class="ringTxt">
        <div id="phaseName"></div>
        <div id="clock">03:00</div>
        <div id="hrLive" style="color:var(--fast);font-size:15px;font-weight:600"></div>
        <div id="zoneLive" style="color:rgba(255,255,255,.45);font-size:12px"></div>
      </div>
    </div>
    <div class="card bpmCard">
      <button class="small ghost" id="bpmMinus">−</button>
      <div><div id="bpmVal"></div><div class="bpmU" data-i="stepsPerMin"></div></div>
      <button class="small ghost" id="bpmPlus">+</button>
    </div>
    <div class="hint" data-i="adjustHint"></div>
    <div class="btns">
      <button class="ghost" id="pauseBtn" data-i="pause"></button>
      <button class="danger" id="stopBtn" data-i="stop"></button>
    </div>
  </div>

  <!-- FINISHED -->
  <div id="finished">
    <div class="emoji">🏆</div>
    <h1 data-i="finished"></h1>
    <p class="sub" id="finStats"></p>
    <p class="sub" data-i="sessionSummary"></p>
    <button id="doneBtn" data-i="done"></button>
  </div>
</div>

<script>
"use strict";
/* ---------- i18n ---------- */
const I18N = {
 ru:{appTitle:"Японская ходьба",subtitle:"Интервальная ходьба (IWT) — метод университета Синсю",
  start:"Начать тренировку",fastPhase:"БЫСТРО",slowPhase:"СПОКОЙНО",finished:"Тренировка завершена!",
  cycle:"Цикл",of:"из",pause:"Пауза",resume:"Продолжить",stop:"Завершить",
  fastPace:"Темп быстрой ходьбы",slowPace:"Темп спокойной ходьбы",stepsPerMin:"шаг/мин",
  phaseLength:"Длительность фазы",minutes:"мин",cyclesCount:"Циклы",totalTime:"Общее время",
  metronome:"Метроном (тик под шаг)",vibration:"Вибрация при смене фазы",phaseSounds:"Звук при смене фазы",
  tickVolume:"Громкость метронома",adjustHint:"Настройте темп кнопками ± под свой шаг",
  sessionSummary:"Отличная работа! Сделайте лёгкую растяжку.",done:"Готово",
  vibNote:"Вибрация работает в Chrome на Android. На iPhone — только звук.",
  connectWatch:"♥ Подключить часы (пульс)",hrConnected:"♥ Подключено: ",
  hrUnsupported:"Пульс по Bluetooth: откройте в Chrome на Android или компьютере (iPhone Safari не поддерживает).",
  hrHint:"Включите на часах трансляцию пульса (Broadcast HR)",
  smartMode:"Умный режим — авто-темп по пульсу",age:"Возраст",targetZone:"Целевые зоны",
  smartHint:"Приложение само ускоряет или замедляет метроном, чтобы пульс держался в зоне: быстро 70–80% от максимума, спокойно 50–65%. Нужны подключённые часы.",
  voice:"Голос (синтез речи) вместо мелодий",weight:"Вес (для калорий)",kg:"кг",
  sayFast:"Ускорьтесь!",saySlow:"Спокойный темп",sayDone:"Тренировка завершена. Отличная работа!",
  streak:"Серия дней",totalWorkouts:"Всего тренировок",stepsU:"шагов",kcalU:"ккал",minU:"мин",
  onbText:"Метод университета Синсю: 3 минуты быстро + 3 минуты спокойно. Пара настроек — и в путь.",
  onbStart:"Поехали!",goalSetting:"Цель: быстрых минут в неделю",weeklyGoal:"Быстрые минуты за неделю",
  calib:"Тест зон (3 мин)",calibRun:"Шагайте максимально быстро 3 минуты — измеряю рабочий пульс",
  calibDone:"Зоны откалиброваны по вашему пульсу: быстрая зона",calibNeedHr:"Сначала подключите часы",
  apply:"Применить",chartT:"Быстрые минуты по неделям",
  coachUp:"Пульс ниже зоны. Прибавьте шагу!",coachDown:"Пульс выше зоны. Сбавьте темп.",
  progrW:"Неделя",progrR:"программы — рекомендуем",progrC:"циклов",recU:"восст. пульса",
  aboutText:"Метод проф. Хироси Носэ и Сидзуэ Масуки (Университет Синсю): 3 мин быстро («тяжело разговаривать») + 3 мин спокойно, 5 циклов = 30 минут, 4–5 раз в неделю. Эффекты в исследованиях: +10% выносливости, снижение давления и сахара, −20% риска возрастных заболеваний."},
 en:{appTitle:"Japanese Walking",subtitle:"Interval Walking Training (IWT) — Shinshu University method",
  start:"Start workout",fastPhase:"FAST",slowPhase:"EASY",finished:"Workout complete!",
  cycle:"Cycle",of:"of",pause:"Pause",resume:"Resume",stop:"Finish",
  fastPace:"Fast walking pace",slowPace:"Easy walking pace",stepsPerMin:"steps/min",
  phaseLength:"Phase length",minutes:"min",cyclesCount:"Cycles",totalTime:"Total time",
  metronome:"Metronome (tick per step)",vibration:"Vibrate on phase change",phaseSounds:"Sound on phase change",
  tickVolume:"Metronome volume",adjustHint:"Tune the pace with ± to match your steps",
  sessionSummary:"Great job! Do some light stretching.",done:"Done",
  vibNote:"Vibration works in Chrome on Android. On iPhone — sound only.",
  connectWatch:"♥ Connect watch (HR)",hrConnected:"♥ Connected: ",
  hrUnsupported:"Bluetooth HR: open in Chrome on Android or desktop (iPhone Safari unsupported).",
  hrHint:"Enable heart-rate broadcast on your watch (Broadcast HR)",
  smartMode:"Smart mode — auto pace by heart rate",age:"Age",targetZone:"Target zones",
  smartHint:"The app speeds up or slows down the metronome to keep your HR in zone: fast 70–80% of max, easy 50–65%. Requires a connected watch.",
  voice:"Speech voice instead of chimes",weight:"Weight (for calories)",kg:"kg",
  sayFast:"Speed up!",saySlow:"Easy pace",sayDone:"Workout complete. Great job!",
  streak:"Day streak",totalWorkouts:"Total workouts",stepsU:"steps",kcalU:"kcal",minU:"min",
  onbText:"The Shinshu University method: 3 minutes fast + 3 minutes easy. A couple of settings and off you go.",
  onbStart:"Let's go!",goalSetting:"Goal: fast minutes per week",weeklyGoal:"Fast minutes this week",
  calib:"Zone test (3 min)",calibRun:"Walk as fast as you can for 3 minutes — measuring your working HR",
  calibDone:"Zones calibrated to your heart rate: fast zone",calibNeedHr:"Connect your watch first",
  apply:"Apply",chartT:"Fast minutes by week",
  coachUp:"Heart rate below zone. Pick up the pace!",coachDown:"Heart rate above zone. Slow down.",
  progrW:"Week",progrR:"of the program — recommended",progrC:"cycles",recU:"HR recovery",
  aboutText:"Developed by Prof. Hiroshi Nose and Shizue Masuki (Shinshu University): 3 min fast (hard to talk) + 3 min easy, 5 cycles = 30 min, 4–5×/week. Studies: +10% aerobic capacity, lower blood pressure and glucose, −20% lifestyle-disease risk."}
};

/* ---------- settings ---------- */
const DEF={fastBpm:135,slowBpm:100,phaseMin:3,cycles:5,metroOn:true,vibOn:true,sndOn:true,vol:80,lang:"ru",smartOn:false,age:40,voiceOn:false,weight:75,onboarded:false,goalMin:60,calibHr:0};
let cfg;
try{cfg=Object.assign({},DEF,JSON.parse(localStorage.getItem("jw")||"{}"));}catch(e){cfg=Object.assign({},DEF);}
const save=()=>{try{localStorage.setItem("jw",JSON.stringify(cfg));}catch(e){}};
const $=id=>document.getElementById(id);
const t=k=>I18N[cfg.lang][k]||k;

function applyI18n(){
  document.querySelectorAll("[data-i]").forEach(el=>el.textContent=t(el.dataset.i));
  document.querySelectorAll("#langSeg button").forEach(b=>b.classList.toggle("on",b.dataset.lang===cfg.lang));
  syncHome();
  if(typeof hrUI==="function")hrUI();
}
function syncHome(){
  $("fastBpm").value=cfg.fastBpm; $("slowBpm").value=cfg.slowBpm;
  $("phaseMin").value=cfg.phaseMin; $("cycles").value=cfg.cycles;
  $("metroOn").checked=cfg.metroOn; $("vibOn").checked=cfg.vibOn; $("sndOn").checked=cfg.sndOn;
  $("vol").value=cfg.vol;
  $("fastVal").textContent=cfg.fastBpm+" "+t("stepsPerMin");
  $("slowVal").textContent=cfg.slowBpm+" "+t("stepsPerMin");
  $("phaseVal").textContent=cfg.phaseMin+" "+t("minutes");
  $("cycVal").textContent=cfg.cycles;
  $("totalVal").textContent=(cfg.phaseMin*2*cfg.cycles)+" "+t("minutes");
  $("volVal").textContent=cfg.vol+"%";
  $("smartOn").checked=cfg.smartOn; $("age").value=cfg.age; $("ageVal").textContent=cfg.age;
  const zf=zone("fast"),zs=zone("slow");
  $("zoneVal").textContent="🔥 "+zf[0]+"–"+zf[1]+" · 🌿 "+zs[0]+"–"+zs[1];
  $("smartSet").style.display=cfg.smartOn?"block":"none";
  $("voiceOn").checked=cfg.voiceOn;
  $("weight").value=cfg.weight; $("weightVal").textContent=cfg.weight+" "+t("kg");
  $("goalMin").value=cfg.goalMin; $("goalMinVal").textContent=cfg.goalMin+" "+t("minU");
  $("calibNote").textContent=cfg.calibHr
    ? "✅ "+t("calibDone")+" "+(cfg.calibHr-8)+"–"+(cfg.calibHr+4)+" "+t("bpm")
    : "";
  renderHist();renderGoal();renderProg();
}
/* ---------- история тренировок ---------- */
const hist={
  load(){try{return JSON.parse(localStorage.getItem("jwHist")||"[]")}catch(e){return[]}},
  add(r){const h=this.load();h.unshift(r);
    try{localStorage.setItem("jwHist",JSON.stringify(h.slice(0,300)))}catch(e){}},
  key(ts){const d=new Date(ts);
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")},
  streak(){const days=new Set(this.load().map(r=>r.d));
    const day=86400000;let cur=new Date();cur.setHours(0,0,0,0);cur=cur.getTime();
    let n=0;
    if(!days.has(this.key(cur)))cur-=day; // серия не рвётся, если сегодня ещё не ходили
    while(days.has(this.key(cur))){n++;cur-=day;}
    return n;}
};
function renderHist(){
  const h=hist.load();
  $("histCard").style.display=h.length?"block":"none";
  if(!h.length)return;
  $("streakVal").textContent=hist.streak();
  $("twVal").textContent=h.length;
  renderBadges(h);renderChart(h);
  $("histList").innerHTML=h.slice(0,7).map(r=>
    '<div class="row" style="font-size:13px;color:var(--dim)"><span>'+r.d+'</span><span>'+
    r.min+" "+t("minU")+" · "+r.st+" 👟 · "+r.kc+" "+t("kcalU")+
    (r.hr?" · ♥"+r.hr:"")+(r.rec?" ↓"+r.rec:"")+"</span></div>").join("");
}
/* голос */
function say(key){
  if(!cfg.voiceOn||!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(t(key));
  u.lang=cfg.lang==="ru"?"ru-RU":"en-US";u.rate=1.05;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}
/* HR-зоны: максимум по Танаке (208 − 0.7×возраст);
   быстрая зона заменяется персональной после теста-калибровки */
const hrMax=()=>Math.round(208-0.7*cfg.age);
const zone=ph=>ph==="fast"
  ?(cfg.calibHr?[cfg.calibHr-8,cfg.calibHr+4]
               :[Math.round(hrMax()*0.70),Math.round(hrMax()*0.80)])
  :[Math.round(hrMax()*0.50),Math.round(hrMax()*0.65)];
function fmtMs(ms){
  const s=Math.ceil(ms/1000);
  return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");
}
/* неделя (понедельник) для даты yyyy-mm-dd */
function weekKey(dstr){
  const d=new Date(dstr+"T12:00:00");
  d.setDate(d.getDate()-(d.getDay()+6)%7);
  return hist.key(d.getTime());
}
function renderGoal(){
  const wk=weekKey(hist.key(Date.now()));
  const fm=hist.load().filter(r=>weekKey(r.d)===wk).reduce((a,r)=>a+(r.fm||0),0);
  $("goalTxt").textContent=Math.round(fm)+" / "+cfg.goalMin+" "+t("minU")+(fm>=cfg.goalMin?" ✅":"");
  $("goalBar").style.width=Math.min(100,fm/cfg.goalMin*100)+"%";
}
function renderProg(){
  const h=hist.load();
  if(!h.length){$("progCard").style.display="none";return;}
  const first=new Date(h[h.length-1].d+"T12:00:00");
  const weekN=Math.floor((Date.now()-first.getTime())/(7*86400000))+1;
  const rec=Math.min(5,1+weekN);
  if(weekN<=5&&cfg.cycles<rec){
    $("progCard").style.display="block";
    $("progTxt").textContent="📈 "+t("progrW")+" "+weekN+" "+t("progrR")+" "+rec+" "+t("progrC");
    $("progApply").onclick=()=>{cfg.cycles=rec;save();syncHome();};
  } else $("progCard").style.display="none";
}
function renderBadges(h){
  const km=h.reduce((a,r)=>a+r.st,0)*0.7/1000,s=hist.streak();
  const B=[[h.length>=1,"🥇 1"],[h.length>=10,"🏅 10"],[h.length>=50,"💪 50"],
           [s>=7,"🔥 7"],[s>=30,"🌟 30"],[km>=100,"🚶 100 km"]];
  $("badges").innerHTML=B.filter(b=>b[0]).map(b=>
    '<span style="background:rgba(255,255,255,.08);border-radius:12px;padding:4px 10px;margin-right:6px">'+b[1]+"</span>").join("");
}
function renderChart(h){
  const m={};h.forEach(r=>{const k=weekKey(r.d);m[k]=(m[k]||0)+(r.fm||0);});
  const now=new Date();now.setDate(now.getDate()-(now.getDay()+6)%7);now.setHours(12,0,0,0);
  const vals=[];
  for(let i=7;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-7*i);vals.push(m[hist.key(d.getTime())]||0);}
  const max=Math.max(cfg.goalMin,...vals,1);
  const gy=75-cfg.goalMin/max*70;
  $("chart").innerHTML=vals.map((v,i)=>{
    const hh=v/max*70,x=i*40+4;
    return '<rect x="'+x+'" y="'+(75-hh)+'" width="32" height="'+Math.max(hh,1)+
      '" rx="4" fill="'+(v>=cfg.goalMin?"#FF7A59":"rgba(255,255,255,.18)")+'"/>';
  }).join("")+
  '<line x1="0" x2="320" y1="'+gy+'" y2="'+gy+'" stroke="rgba(255,255,255,.3)" stroke-dasharray="4 4"/>';
}
["fastBpm","slowBpm","phaseMin","cycles","vol","age","weight","goalMin"].forEach(id=>
  $(id).addEventListener("input",e=>{cfg[id]=+e.target.value;save();syncHome();}));
["metroOn","vibOn","sndOn","smartOn","voiceOn"].forEach(id=>
  $(id).addEventListener("change",e=>{cfg[id]=e.target.checked;save();syncHome();}));
document.querySelectorAll("#langSeg button").forEach(b=>
  b.addEventListener("click",()=>{cfg.lang=b.dataset.lang;save();applyI18n();}));

/* ---------- audio (Web Audio, no files needed) ---------- */
let AC=null;
const audio=()=>AC||(AC=new (window.AudioContext||window.webkitAudioContext)());
function blip(time,freq,vol,dur=0.05){
  const a=audio(),o=a.createOscillator(),g=a.createGain();
  o.frequency.value=freq;o.connect(g);g.connect(a.destination);
  g.gain.setValueAtTime(Math.max(vol,0.001),time);
  g.gain.exponentialRampToValueAtTime(0.001,time+dur);
  o.start(time);o.stop(time+dur+0.02);
}
/* мягкий «колокольчик»: основной тон + обертон, долгое затухание */
function bell(time,freq,vol,dur=0.6){
  const a=audio();
  [[freq,vol],[freq*2,vol*0.35],[freq*3,vol*0.12]].forEach(([f,v])=>{
    const o=a.createOscillator(),g=a.createGain();
    o.frequency.value=f;o.connect(g);g.connect(a.destination);
    g.gain.setValueAtTime(0.001,time);
    g.gain.linearRampToValueAtTime(Math.max(v,0.001),time+0.012);
    g.gain.exponentialRampToValueAtTime(0.001,time+dur);
    o.start(time);o.stop(time+dur+0.05);
  });
}
function melody(notes,vol=0.5){
  let tm=audio().currentTime+0.03;
  notes.forEach(([f,d])=>{bell(tm,f,vol,d);tm+=d*0.55;});
}
/* подсказки: восходящая квинта = быстрее, нисходящая = спокойнее */
const SND={fast:[[523,.5],[784,.9]],slow:[[784,.5],[523,1.0]],
           finish:[[523,.4],[659,.4],[784,1.2]],
           coachUp:[[659,.3],[880,.6]],coachDown:[[880,.3],[587,.7]]};

/* щелчок механического метронома: короткий шумовой импульс через
   полосовой фильтр — резкая атака, без «хвоста» */
let _clickBuf=null;
function click(time,vol){
  const a=audio();
  if(!_clickBuf){
    _clickBuf=a.createBuffer(1,Math.floor(a.sampleRate*0.02),a.sampleRate);
    const d=_clickBuf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);
  }
  const src=a.createBufferSource();src.buffer=_clickBuf;
  const f=a.createBiquadFilter();f.type="bandpass";f.frequency.value=2500;f.Q.value=1.4;
  const g=a.createGain();g.gain.value=vol*2.2;
  src.connect(f);f.connect(g);g.connect(a.destination);
  src.start(time);
}

/* metronome: look-ahead scheduler — drift-free, ОДИН чёткий щелчок на шаг */
const metro={timer:null,next:0,bpm:120,
  start(bpm){this.bpm=bpm;if(this.timer)return;
    this.next=audio().currentTime+0.1;
    this.timer=setInterval(()=>{
      const a=audio();
      while(this.next<a.currentTime+0.12){
        click(this.next,cfg.vol/100*0.8);
        this.next+=60/this.bpm;
      }
    },25);},
  stop(){clearInterval(this.timer);this.timer=null;}
};

/* ---------- session ---------- */
const RING_LEN=791.7;
const S={running:false,paused:false,phase:"fast",cycle:0,elapsed:0,last:0,ui:null,lock:null};
const phaseMs=()=>cfg.phaseMin*60000;
const curBpm=()=>S.phase==="fast"?cfg.fastBpm:cfg.slowBpm;
const color=()=>S.phase==="fast"?"#FF7A59":"#4FD8C4";

function show(id){["home","session","finished"].forEach(x=>$(x).style.display=x===id?"block":"none");}

async function wakeLock(){try{S.lock=await navigator.wakeLock?.request("screen");}catch(e){}}
document.addEventListener("visibilitychange",()=>{if(S.running&&document.visibilityState==="visible")wakeLock();});

function announce(){
  say(S.phase==="fast"?"sayFast":"saySlow");
  if(cfg.sndOn)melody(SND[S.phase]);
  if(cfg.vibOn&&navigator.vibrate)
    navigator.vibrate(S.phase==="fast"?[250,120,250,120,250]:[700]);
}

function startSession(){
  audio().resume();
  Object.assign(S,{running:true,paused:false,phase:"fast",cycle:0,elapsed:0,
    last:performance.now(),steps:0,kcal:0,actMs:0,lastCnt:0,lastAdj:0,
    fastMs:0,hrSum:0,hrN:0,recArr:[],hrFastEnd:0,recDone:true,outMs:0,coachSaid:false});
  show("session");wakeLock();
  if(cfg.metroOn)metro.start(curBpm());
  announce();render();
  S.ui=setInterval(tick,200);
}
function tick(){
  if(!S.running||S.paused)return;
  const now=performance.now(),dt=now-S.last;
  S.elapsed+=dt;S.last=now;S.actMs+=dt;
  /* метрики: шаги из каденса, ккал из MET (быстро 5.0 / спокойно 3.0) */
  S.steps+=dt/60000*curBpm();
  S.kcal+=dt/60000*(S.phase==="fast"?5.0:3.0)*3.5*cfg.weight/200;
  if(S.phase==="fast")S.fastMs+=dt;
  if(hrVal){S.hrSum+=hrVal;S.hrN++;}
  /* восстановление пульса: падение за 60 с после быстрой фазы */
  if(S.phase==="slow"&&S.hrFastEnd&&!S.recDone&&S.elapsed>=60000&&hrVal){
    S.recArr.push(S.hrFastEnd-hrVal);S.recDone=true;
  }
  /* коуч: вне зоны дольше 2 минут подряд — колокольчик (или голос, если включён) */
  if(cfg.smartOn&&hrVal){
    const [lo,hi]=zone(S.phase);
    if(hrVal<lo-2||hrVal>hi+2){
      S.outMs+=dt;
      if(S.outMs>120000&&!S.coachSaid){
        const k=hrVal<lo?"coachUp":"coachDown";
        if(cfg.voiceOn)say(k);else melody(SND[k],0.55);
        S.coachSaid=true;
      }
    } else {S.outMs=0;S.coachSaid=false;}
  }
  /* отсчёт 3-2-1 перед сменой фазы */
  const remainS=Math.ceil((phaseMs()-S.elapsed)/1000);
  if(cfg.sndOn&&remainS<=3&&remainS>=1&&remainS!==S.lastCnt){
    S.lastCnt=remainS;blip(audio().currentTime,1320,cfg.vol/100*0.5,0.07);
  }
  if(S.elapsed>=phaseMs())nextPhase();
  /* умный режим: первые 45 с фазы пульс «догоняет», потом каждые 15 с
     сверяем с зоной и двигаем темп на ±2 шаг/мин */
  if(cfg.smartOn&&hrVal&&S.elapsed>45000&&now-(S.lastAdj||0)>15000){
    const [lo,hi]=zone(S.phase);
    if(hrVal<lo-2)adjust(2);
    else if(hrVal>hi+2)adjust(-2);
    S.lastAdj=now;
  }
  render();
}
function nextPhase(){
  S.elapsed=0;S.lastCnt=0;S.outMs=0;S.coachSaid=false;
  if(S.phase==="fast"){S.hrFastEnd=hrVal||0;S.recDone=!hrVal;S.phase="slow";}
  else{S.phase="fast";S.cycle++;
    if(S.cycle>=cfg.cycles){finish(true);return;}}
  metro.bpm=curBpm();announce();
}
function render(){
  const remain=Math.max(0,phaseMs()-S.elapsed);
  const mm=String(Math.floor(remain/60000)).padStart(2,"0");
  const ss=String(Math.ceil(remain%60000/1000)%60).padStart(2,"0");
  $("clock").textContent=mm+":"+ss;
  $("phaseName").textContent=t(S.phase==="fast"?"fastPhase":"slowPhase");
  $("phaseName").style.color=color();
  const p=Math.min(1,S.elapsed/phaseMs());
  const ring=$("ring");ring.setAttribute("stroke",color());
  ring.setAttribute("stroke-dashoffset",RING_LEN*(1-p));
  const done=S.cycle*2+(S.phase==="slow"?1:0);
  const tp=(done+p)/(cfg.cycles*2)*100;
  $("totalBar").style.width=tp+"%";$("totalBar").style.background=color();
  $("cycLabel").textContent=t("cycle")+" "+(S.cycle+1)+" "+t("of")+" "+cfg.cycles;
  $("bpmVal").textContent=curBpm();
  $("pauseBtn").textContent=t(S.paused?"resume":"pause");
  $("zoneLive").textContent=(cfg.smartOn&&hrDev)?t("targetZone")+" ♥ "+zone(S.phase).join("–"):"";
  $("statsLive").textContent=Math.round(S.steps)+" 👟 · "+Math.round(S.kcal)+" "+t("kcalU");
}
function finish(fanfare){
  S.running=false;clearInterval(S.ui);metro.stop();
  S.lock?.release().catch(()=>{});S.lock=null;
  /* сохраняем тренировку длиннее минуты в историю */
  if(S.actMs>60000){
    hist.add({d:hist.key(Date.now()),min:Math.round(S.actMs/60000),
      st:Math.round(S.steps),kc:Math.round(S.kcal),
      fm:Math.round(S.fastMs/60000*10)/10,
      hr:S.hrN?Math.round(S.hrSum/S.hrN):0,
      rec:S.recArr.length?Math.round(S.recArr.reduce((a,b)=>a+b,0)/S.recArr.length):0});
    renderHist();renderGoal();renderProg();
  }
  if(fanfare){
    say("sayDone");
    if(cfg.sndOn)melody(SND.finish);
    if(cfg.vibOn&&navigator.vibrate)navigator.vibrate([300,150,300,150,600]);
    $("finStats").textContent=Math.round(S.actMs/60000)+" "+t("minU")+" · "+
      Math.round(S.steps)+" 👟 · "+Math.round(S.kcal)+" "+t("kcalU")+" · "+
      (S.steps*0.7/1000).toFixed(1)+" km";
    show("finished");
  } else show("home");
}

$("startBtn").onclick=startSession;
$("pauseBtn").onclick=()=>{
  if(S.paused){S.paused=false;S.last=performance.now();if(cfg.metroOn)metro.start(curBpm());}
  else{S.paused=true;metro.stop();}
  render();
};
$("stopBtn").onclick=()=>finish(false);
$("doneBtn").onclick=()=>show("home");
$("bpmMinus").onclick=()=>adjust(-2);
$("bpmPlus").onclick=()=>adjust(2);

/* ---------- heart rate via Web Bluetooth (standard service 0x180D) ---------- */
let hrDev=null,hrVal=null;
function hrUI(){
  const btn=$("hrBtn");
  if(!navigator.bluetooth){btn.style.display="none";$("hrNote").textContent=t("hrUnsupported");return;}
  btn.textContent=hrDev?t("hrConnected")+(hrDev.name||""):t("connectWatch");
  $("hrNote").textContent=hrDev?"":t("hrHint");
  $("hrLive").textContent=hrVal?("♥ "+hrVal):"";
}
async function hrToggle(){
  if(hrDev){hrDev.gatt.disconnect();return;}
  try{
    const d=await navigator.bluetooth.requestDevice({filters:[{services:["heart_rate"]}]});
    const srv=await(await d.gatt.connect()).getPrimaryService("heart_rate");
    const ch=await srv.getCharacteristic("heart_rate_measurement");
    await ch.startNotifications();
    ch.addEventListener("characteristicvaluechanged",e=>{
      const v=e.target.value;
      hrVal=(v.getUint8(0)&1)?v.getUint16(1,true):v.getUint8(1);
      hrUI();
    });
    d.addEventListener("gattserverdisconnected",()=>{hrDev=null;hrVal=null;hrUI();});
    hrDev=d;hrUI();
  }catch(e){
    if(e.name!=="NotFoundError"||!/cancel/i.test(e.message||""))
      $("hrNote").textContent="⚠ "+e.name+": "+e.message;
  }
}
$("hrBtn").onclick=hrToggle;
function adjust(d){
  if(S.phase==="fast")cfg.fastBpm=Math.min(190,Math.max(90,cfg.fastBpm+d));
  else cfg.slowBpm=Math.min(140,Math.max(50,cfg.slowBpm+d));
  save();metro.bpm=curBpm();render();
}

/* ---------- онбординг (первый запуск) ---------- */
function onbSync(){
  $("onbAgeVal").textContent=cfg.age;
  $("onbWeightVal").textContent=cfg.weight+" "+t("kg");
  $("onbGoalVal").textContent=cfg.goalMin+" "+t("minU");
  $("onbAge").value=cfg.age;$("onbWeight").value=cfg.weight;$("onbGoal").value=cfg.goalMin;
  document.querySelectorAll("#onbLang button").forEach(b=>b.classList.toggle("on",b.dataset.lang===cfg.lang));
}
[["onbAge","age"],["onbWeight","weight"],["onbGoal","goalMin"]].forEach(([el,k])=>
  $(el).addEventListener("input",e=>{cfg[k]=+e.target.value;save();onbSync();}));
document.querySelectorAll("#onbLang button").forEach(b=>
  b.addEventListener("click",()=>{cfg.lang=b.dataset.lang;save();applyI18n();onbSync();}));
$("onbGo").onclick=()=>{cfg.onboarded=true;save();$("onb").style.display="none";syncHome();};

/* ---------- тест-калибровка зон: 3 мин максимально быстрой ходьбы ---------- */
const CAL={timer:null,samples:[],t0:0};
$("calibBtn").onclick=()=>{
  if(!hrDev){$("calibNote").textContent="⚠ "+t("calibNeedHr");return;}
  audio().resume();
  $("calib").style.display="block";
  CAL.samples=[];CAL.t0=performance.now();
  if(cfg.metroOn)metro.start(cfg.fastBpm);
  CAL.timer=setInterval(()=>{
    const el=performance.now()-CAL.t0,rem=Math.max(0,180000-el);
    $("calibClock").textContent=fmtMs(rem);
    $("calibHr").textContent=hrVal?("♥ "+hrVal):"—";
    if(hrVal&&el>120000)CAL.samples.push(hrVal); // усредняем последнюю минуту
    if(rem<=0)endCalib(true);
  },500);
};
$("calibStop").onclick=()=>endCalib(false);
function endCalib(ok){
  clearInterval(CAL.timer);CAL.timer=null;metro.stop();
  $("calib").style.display="none";
  if(ok&&CAL.samples.length){
    cfg.calibHr=Math.round(CAL.samples.reduce((a,b)=>a+b,0)/CAL.samples.length);
    save();syncHome();
  }
}

applyI18n();show("home");hrUI();onbSync();
if(!cfg.onboarded)$("onb").style.display="block";
</script>
